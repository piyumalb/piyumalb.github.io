    <style>
        /* Extreme Performance Optimization */
        html, body {
            max-width: 100%;
            overflow-x: hidden;
            background-color: #000000;
            margin: 0;
            padding: 0;
        }

        body { 
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
            color: #ffffff;
            -webkit-user-select: none;
            user-select: none;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeSpeed;
            /* Force GPU acceleration on the whole body */
            transform: translate3d(0,0,0);
        }

        /* Ambient Glow - Optimized for performance */
        .ambient-glow {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.08;
            will-change: transform;
            transform: translate3d(0,0,0);
        }
        .glow-1 {
            width: 70vw; height: 70vw;
            top: -15%; left: -15%;
            background: radial-gradient(circle, rgba(90, 30, 190, 0.4) 0%, transparent 70%);
        }
        .glow-2 {
            width: 60vw; height: 60vw;
            bottom: -15%; right: -15%;
            background: radial-gradient(circle, rgba(30, 90, 190, 0.4) 0%, transparent 70%);
        }

        /* Profile Card - Fixed White Lines and Overflow */
        .glass-container {
            background: #060609;
            /* Border completely removed to fix white line bug */
            border: none !important;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 1);
            border-radius: 2.5rem;
            width: 92%;
            max-width: 410px;
            position: relative;
            overflow: hidden;
            padding-bottom: 3.5rem;
            will-change: transform;
            transform: translate3d(0,0,0);
            /* Clipping fix */
            -webkit-mask-image: -webkit-radial-gradient(white, black);
        }

        /* Cover Area Fix - No gaps or lines */
        .cover-wrapper {
            position: absolute;
            top: -1px; /* Overlap top edge to hide any line */
            left: -1px;
            right: -1px;
            height: 165px;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        /* Smooth Cover Animation */
        .cover-animate {
            width: 105%;
            height: 105%;
            background-size: cover;
            background-position: center;
            animation: panImage 40s ease-in-out infinite alternate;
            will-change: transform;
        }
        @keyframes panImage {
            0% { transform: scale(1.0) translate3d(0, 0, 0); }
            100% { transform: scale(1.1) translate3d(-1%, -1%, 0); }
        }

        /* Ultra Smooth Buttons - GPU Rendering */
        .btn-ultra {
            position: relative;
            overflow: hidden;
            transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1), 
                        filter 0.25s ease;
            will-change: transform;
            transform: translate3d(0,0,0); 
            border: none !important;
            outline: none !important;
        }

        .btn-ultra:hover {
            transform: scale(1.02) translateY(-2px) translate3d(0,0,0);
            filter: brightness(1.1);
        }

        .btn-ultra:active {
            transform: scale(0.97) translate3d(0,0,0);
        }

        /* Entrance Animations */
        .reveal-up { 
            opacity: 0; 
            transform: translateY(20px) translate3d(0,0,0); 
            animation: reveal 0.7s cubic-bezier(0.19, 1, 0.22, 1) forwards; 
        }
        @keyframes reveal { 
            to { opacity: 1; transform: translateY(0) translate3d(0,0,0); } 
        }
        
        /* Fix image flicker during transition */
        img {
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            -webkit-transform-style: preserve-3d;
            transform-style: preserve-3d;
        }
    </style>
</head>
